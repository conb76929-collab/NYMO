<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneStore</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #6366f1; --bg: #020617; --card: #1e293b; --text: #f8fafc; 
            --accent: #10b981; --gold: #fbbf24; --danger: #ef4444; 
        }
        .nebula-theme { --primary: #d946ef; --bg: #1e1b4b; --card: #312e81; }
        
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .side-btn { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; font-size: 0.85rem; margin-bottom: 5px; border: none; background: none; width: 100%; text-align: left; }
        .side-btn:hover, .side-btn.active { background: var(--primary); color: white; }

        /* Content Area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Table & Lists */
        .vault-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .vault-table tr { cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .vault-table tr:hover { background: rgba(99, 102, 241, 0.1); }
        .vault-table td { padding: 15px; font-size: 0.85rem; }

        /* Settings & Plans */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .plan-item { background: var(--card); border: 1px solid #334155; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.6rem; }

        /* Overlay */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid var(--primary); }

        .switch { position: relative; width: 32px; height: 16px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h4 id="modal-filename" style="margin-top:0">File Action</h4>
            <button class="side-btn active" id="dl-btn" style="justify-content:center; margin-bottom:10px">Download</button>
            <button class="side-btn" id="del-btn" style="background:var(--danger); color:white; justify-content:center">Delete</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight: 900; color: var(--primary); padding: 20px; font-size: 1.2rem;">ONESTORE</div>
        <button class="side-btn active" onclick="navTo('dash', this)"><i data-lucide="plus-circle"></i> Ingest</button>
        <button class="side-btn" onclick="navTo('vault', this)"><i data-lucide="database"></i> Vault (<span id="count-badge">0</span>)</button>
        <button class="side-btn" onclick="navTo('plans', this)"><i data-lucide="layers"></i> 50 Plans</button>
        <button class="side-btn" onclick="navTo('settings', this)"><i data-lucide="sliders"></i> Settings</button>
    </div>

    <div class="main">
        <div class="content">
            <div id="dash-panel" class="panel active">
                <h1>Ingest Hub</h1>
                <div style="border: 2px dashed #334155; padding: 60px; text-align: center; cursor: pointer; border-radius: 20px;" onclick="document.getElementById('file-in').click()">
                    <i data-lucide="upload-cloud" style="width: 48px; color: var(--primary);"></i>
                    <p>Click to add files to the Permanent Vault</p>
                    <input type="file" id="file-in" hidden multiple onchange="handleUpload(this.files)">
                </div>
            </div>

            <div id="vault-panel" class="panel">
                <h1>The Vault</h1>
                <table class="vault-table"><tbody id="vault-tbody"></tbody></table>
            </div>

            <div id="plans-panel" class="panel">
                <h1>Quantum Plans</h1>
                <div class="plans-grid" id="plans-list"></div>
            </div>

            <div id="settings-panel" class="panel">
                <h1>Control Center</h1>
                <div class="settings-grid">
                    <div class="card">
                        <h3>Visual System</h3>
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span>Nebula Mode</span>
                            <label class="switch"><input type="checkbox" onchange="document.body.classList.toggle('nebula-theme')"><span class="slider"></span></label>
                        </div>
                        <p style="font-size:0.6rem; color:#64748b;">40+ background protocols active.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        // Using a fresh DB name to avoid collision with the broken ones
        const request = indexedDB.open("OneStore_Reinforced_V5", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("vault", { keyPath: "id" });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            refreshVault();
            genPlans();
        };

        async function handleUpload(files) {
            for (const file of Array.from(files)) {
                const base64 = await toBase64(file);
                const tx = db.transaction("vault", "readwrite");
                const store = tx.objectStore("vault");
                
                await new Promise((resolve) => {
                    const addRequest = store.add({
                        id: Date.now() + Math.random(),
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + " KB",
                        data: base64
                    });
                    addRequest.onsuccess = () => resolve();
                });
            }
            refreshVault();
            navTo('vault', document.querySelectorAll('.side-btn')[1]);
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function refreshVault() {
            const tbody = document.getElementById('vault-tbody');
            tbody.innerHTML = "";
            const tx = db.transaction("vault", "readonly");
            tx.objectStore("vault").getAll().onsuccess = (e) => {
                const files = e.target.result;
                document.getElementById('count-badge').innerText = files.length;
                files.forEach(f => {
                    const row = document.createElement('tr');
                    row.onclick = () => openModal(f);
                    row.innerHTML = `<td><i data-lucide="file" style="width:14px; margin-right:10px"></i>${f.name}</td><td>${f.size}</td>`;
                    tbody.appendChild(row);
                });
                lucide.createIcons();
            };
        }

        function openModal(file) {
            document.getElementById('modal-filename').innerText = file.name;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('dl-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = file.data;
                a.download = file.name;
                a.click();
                closeModal();
            };
            document.getElementById('del-btn').onclick = () => {
                db.transaction("vault", "readwrite").objectStore("vault").delete(file.id).onsuccess = () => {
                    refreshVault();
                    closeModal();
                };
            };
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function genPlans() {
            const list = document.getElementById('plans-list');
            for(let i=1; i<=50; i++) {
                const d = document.createElement('div');
                d.className = 'plan-item';
                d.innerHTML = `TIER ${i}<br><b>${i*10} TB</b>`;
                list.appendChild(d);
            }
        }

        function navTo(id, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-panel').classList.add('active');
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
